<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Registrace — Moje aplikace</title>
  <link rel="stylesheet" href="index.css" />
</head>
<body>
  <main class="container">
    <section class="card">
      <h1 class="title">Registrace</h1>

      <form id="register-form" novalidate>
        <div class="field">
          <label for="name">Jméno</label>
          <input id="name" name="name" type="text" required placeholder="Jan Novák" />
          <div class="error" id="name-error"></div>
        </div>

        <div class="field">
          <label for="email">E-mail</label>
          <input id="email" name="email" type="email" required placeholder="email@mail.cz" />
          <div class="error" id="email-error"></div>
        </div>

        <div class="field">
          <label for="password">Heslo</label>
          <div class="password-wrapper">
            <input id="password" name="password" type="password" required placeholder="••••••••" />
            <button type="button" id="togglePassword" class="icon-btn">👁️</button>
          </div>
          <div class="error" id="password-error"></div>
        </div>

        <div class="actions">
          <button type="submit" class="primary">Registrovat</button>
        </div>

        <p class="signup">Máte účet? <a href="index.html">Přihlaste se</a></p>

        <div id="server-message" class="server-message"></div>
      </form>
    </section>

    <aside class="info">
      <h2>Vítejte</h2>
      <p>Vytvořte si nový účet a začněte používat aplikaci.</p>
    </aside>
  </main>

  <script src="register.js"></script>
</body>
</html>
